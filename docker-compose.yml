# =====================================================
# AGROSHOP - DOCKER COMPOSE (PRODUCCIÓN VPS - PRO)
# Servicios: App + PostgreSQL + Redis
# Nginx externo maneja tráfico (80/443)
# =====================================================

services:
  # -------------------------
  # PostgreSQL
  # -------------------------
  db:
    image: postgres:16-alpine
    container_name: agroshop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-AgroShop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-constraints.sql:/docker-entrypoint-initdb.d/01-init-constraints.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-AgroShop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # -------------------------
  # Redis
  # -------------------------
  redis:
    image: redis:7-alpine
    container_name: agroshop-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # -------------------------
  # Aplicación Next.js
  # -------------------------
  app:
    image: daniel007pog/agroshop:latest
    container_name: agroshop-app
    restart: unless-stopped

    # ❗ No exponer puerto al host
    expose:
      - "3000"

    # Redes
    networks:
      - internal   # acceso a db y redis
      - web        # acceso desde nginx

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-AgroShop}

      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AgroShop SENA}
      NEXT_PUBLIC_IVA_PERCENTAGE: ${NEXT_PUBLIC_IVA_PERCENTAGE:-10}
      NEXT_PUBLIC_STOCK_BAJO_UMBRAL: ${NEXT_PUBLIC_STOCK_BAJO_UMBRAL:-10}
      NEXT_PUBLIC_DIAS_ALERTA_VENCIMIENTO: ${NEXT_PUBLIC_DIAS_ALERTA_VENCIMIENTO:-7}

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}

      REDIS_URL: redis://redis:6379
      NODE_ENV: production

    volumes:
      - productos_uploads:/app/public/productos

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------
  # Migraciones (manual)
  # -------------------------
  migrate:
    image: daniel007pog/agroshop:latest
    container_name: agroshop-migrate
    networks:
      - internal
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-AgroShop}
    command: >
      sh -c "npx prisma db push --skip-generate && node scripts/docker-seed.js"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate
    
  # -------------------------
  # Watcher: Actualización Automática
  # -------------------------
  watchtower:
    image: containrrr/watchtower
    container_name: agroshop-watcher
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Elimina imágenes viejas para no llenar el disco de la VPS
      - WATCHTOWER_CLEANUP=true 
      # Revisa cada 300 segundos (5 minutos)
      - WATCHTOWER_POLL_INTERVAL=300
      # Solo vigila este contenedor (opcional, pero recomendado)
      - WATCHTOWER_INCLUDE_RESTARTING=true
    command: agroshop-app

# -------------------------
# Volúmenes persistentes
# -------------------------
volumes:
  postgres_data:
  redis_data:
  productos_uploads:

# -------------------------
# Redes
# -------------------------
networks:
  internal:
    driver: bridge

  web:
    external: true