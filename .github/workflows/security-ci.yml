name: Security & Quality CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  typecheck-and-lint:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint

  audit-dependencies:
    name: Dependency Audit (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high/critical)
        run: npm audit --audit-level=high || true
      - name: Check for known vulnerabilities
        run: npx better-npm-audit audit --level high

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [typecheck-and-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --build-arg DATABASE_URL=postgresql://test:test@localhost:5432/test \
            --build-arg NEXTAUTH_SECRET=ci-test-secret-not-real \
            -t agroshp:ci-test .
